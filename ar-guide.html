<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>神戸ポートタワー ARガイド</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-family: sans-serif;
      z-index: 1000;
      max-width: 300px;
    }
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    .btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="info">
    <h3>🏯 神戸ポートタワー ARガイド</h3>
    <p>マーカーをカメラに向けてください</p>
  </div>
  
  <div id="controls">
    <button class="btn" onclick="toggleCamera()">📷 切替</button>
    <button class="btn" onclick="showInfo()">ℹ️ 情報</button>
  </div>

  <!-- AR.js マーカー型AR -->
  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
    
    <!-- マーカー -->
    <a-marker preset="hiro">
      
      <!-- 神戸ポートタワーの3Dモデル（シンプルな箱で代用） -->
      <a-box position="0 0.5 0" 
             color="#ff6b6b" 
             scale="0.5 1.5 0.5"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
      </a-box>
      
      <!-- テキスト表示 -->
      <a-text value="神戸ポートタワー\n五感体験ARガイド" 
              position="0 2 0" 
              align="center" 
              color="white"
              scale="1.5 1.5 1.5">
      </a-text>
      
    </a-marker>
    
    <!-- カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let useFrontCamera = false;
    
    function toggleCamera() {
      useFrontCamera = !useFrontCamera;
      const video = document.querySelector('video');
      if (video) {
        const constraints = {
          video: {
            facingMode: useFrontCamera ? 'user' : 'environment'
          }
        };
        navigator.mediaDevices.getUserMedia(constraints)
          .then(stream => {
            video.srcObject = stream;
          })
          .catch(err => console.error('カメラエラー:', err));
      }
    }
    
    function showInfo() {
      alert('神戸ポートタワー ARガイド\n\nマーカーをカメラに向けてください。\nマーカーはQRコードからダウンロードできます。');
    }
  </script>
</body>
</html>
