<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神戸ポートタワー ARガイド</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: sans-serif;
      z-index: 1000;
      max-width: 90%;
    }
    #info h3 { margin: 0 0 10px 0; font-size: 18px; }
    #info p { margin: 5px 0; font-size: 14px; }
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 20px 40px;
      border-radius: 30px;
      font-size: 20px;
      cursor: pointer;
      z-index: 2000;
    }
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,0,0,0.8);
      color: white;
      padding: 20px;
      border-radius: 10px;
      display: none;
      z-index: 3000;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- カメラ起動ボタン -->
  <button id="start-btn" onclick="startAR()">🎬 ARを始める</button>
  
  <div id="info" style="display:none;">
    <h3>🏯 神戸ポートタワー ARガイド</h3>
    <p>画面をタップして AR コンテンツを配置してください</p>
  </div>
  
  <!-- 昼/夜切り替えボタン -->
  <div id="mode-controls" style="display:none; position: fixed; bottom: 20px; left: 20px; z-index: 2000;">
    <button onclick="toggleNightMode()" style="background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 20px; margin-right: 10px; cursor: pointer; font-size: 14px;">
      🌙 夜間モード
    </button>
    <button onclick="toggleEffects()" style="background: #7ed321; color: white; border: none; padding: 12px 24px; border-radius: 20px; cursor: pointer; font-size: 14px;">
      ✨ 演出ON/OFF
    </button>
  </div>
  
  <div id="error-msg">
    <p id="error-text">エラーが発生しました</p>
    <button onclick="location.reload()" style="margin-top:10px; padding:10px 20px;">再試行</button>
  </div>

  <!-- AR.js マーカーレス AR -->
  <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" style="display:none;">
    
    <!-- 昼間ライティング（デフォルト） -->
    <a-light id="ambient-day" type="ambient" color="white" intensity="1.0"></a-light>
    <a-light id="directional-day" type="directional" color="white" intensity="0.8" position="5 10 5"></a-light>
    
    <!-- 夜間ライティング（非表示） -->
    <a-light id="ambient-night" type="ambient" color="#1a3a52" intensity="0.3" visible="false"></a-light>
    <a-light id="directional-night" type="directional" color="#4a7ba7" intensity="0.4" position="0 8 0" visible="false"></a-light>
    <a-light id="point-night" type="point" color="#ffeb3b" intensity="0.6" position="-2 3 -3" visible="false"></a-light>
    
    <!-- 昼間背景 -->
    <a-sky id="sky-day" color="#87ceeb"></a-sky>
    
    <!-- 夜間背景 -->
    <a-sky id="sky-night" color="#0d1b2a" visible="false"></a-sky>
    
    <!-- 月 -->
    <a-sphere id="moon" position="-8 5 -15" radius="2" color="#f0f0f0" emissive="#cccccc" visible="false"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear">
    </a-sphere>
    
    <!-- 星（パーティクル風） -->
    <a-entity id="stars" visible="false">
      <a-sphere position="-10 8 -20" radius="0.1" color="white" emissive="white"></a-sphere>
      <a-sphere position="5 9 -18" radius="0.1" color="white" emissive="white"></a-sphere>
      <a-sphere position="-3 6 -22" radius="0.08" color="white" emissive="white"></a-sphere>
      <a-sphere position="8 7 -20" radius="0.12" color="white" emissive="white"></a-sphere>
      <a-sphere position="-6 10 -18" radius="0.09" color="white" emissive="white"></a-sphere>
      <a-sphere position="3 8 -21" radius="0.11" color="white" emissive="white"></a-sphere>
      <a-sphere position="-12 9 -19" radius="0.08" color="white" emissive="white"></a-sphere>
      <a-sphere position="10 6 -22" radius="0.1" color="white" emissive="white"></a-sphere>
    </a-entity>
    
    <!-- AR コンテンツコンテナ -->
    <a-entity id="ar-content">
    </a-entity>
    
    <!-- パーティクルエフェクト（光の粒） -->
    <a-entity id="particle-system" visible="false"></a-entity>
    
    <!-- カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let arStarted = false;
    let contentCreated = false;
    let isNightMode = false;
    let effectsEnabled = false;
    
    function startAR() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';
      document.getElementById('info').style.display = 'block';
      document.getElementById('mode-controls').style.display = 'block';
      arStarted = true;
    }
    
    // 昼/夜モード切り替え
    function toggleNightMode() {
      isNightMode = !isNightMode;
      
      const skyDay = document.getElementById('sky-day');
      const skyNight = document.getElementById('sky-night');
      const ambientDay = document.getElementById('ambient-day');
      const ambientNight = document.getElementById('ambient-night');
      const directionalDay = document.getElementById('directional-day');
      const directionalNight = document.getElementById('directional-night');
      const pointNight = document.getElementById('point-night');
      const moon = document.getElementById('moon');
      const stars = document.getElementById('stars');
      
      if (isNightMode) {
        // 夜間モードに変更
        skyDay.setAttribute('visible', false);
        skyNight.setAttribute('visible', true);
        ambientDay.setAttribute('visible', false);
        ambientNight.setAttribute('visible', true);
        directionalDay.setAttribute('visible', false);
        directionalNight.setAttribute('visible', true);
        pointNight.setAttribute('visible', true);
        moon.setAttribute('visible', true);
        stars.setAttribute('visible', true);
        
        // コンテンツの色を夜間用に調整
        const box = document.querySelector('a-box');
        if (box) {
          box.setAttribute('color', '#ff9500'); // オレンジ色（夜間向け）
        }
        const text = document.querySelector('a-text');
        if (text) {
          text.setAttribute('color', '#ffeb3b'); // 黄色
        }
      } else {
        // 昼間モードに変更
        skyDay.setAttribute('visible', true);
        skyNight.setAttribute('visible', false);
        ambientDay.setAttribute('visible', true);
        ambientNight.setAttribute('visible', false);
        directionalDay.setAttribute('visible', true);
        directionalNight.setAttribute('visible', false);
        pointNight.setAttribute('visible', false);
        moon.setAttribute('visible', false);
        stars.setAttribute('visible', false);
        
        // コンテンツの色を昼間用に戻す
        const box = document.querySelector('a-box');
        if (box) {
          box.setAttribute('color', '#ff6b6b');
        }
        const text = document.querySelector('a-text');
        if (text) {
          text.setAttribute('color', 'white');
        }
      }
    }
    
    // 演出効果ON/OFF
    function toggleEffects() {
      effectsEnabled = !effectsEnabled;
      const particleSystem = document.getElementById('particle-system');
      
      if (effectsEnabled) {
        particleSystem.setAttribute('visible', true);
        createParticleEffects();
      } else {
        particleSystem.setAttribute('visible', false);
        particleSystem.innerHTML = '';
      }
    }
    
    // パーティクルエフェクト生成
    function createParticleEffects() {
      const particleSystem = document.getElementById('particle-system');
      particleSystem.innerHTML = '';
      
      // ランダムなパーティクルを生成
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('a-sphere');
        const x = (Math.random() - 0.5) * 6;
        const y = (Math.random() - 0.5) * 6 - 1;
        const z = (Math.random() - 0.5) * 4 - 3;
        
        particle.setAttribute('position', `${x} ${y} ${z}`);
        particle.setAttribute('radius', '0.05');
        particle.setAttribute('color', `hsl(${Math.random() * 60 + 30}, 100%, 50%)`); // 黄〜オレンジ色
        particle.setAttribute('emissive', `hsl(${Math.random() * 60 + 30}, 100%, 50%)`);
        particle.setAttribute('material', 'transparent: true; opacity: 0.7;');
        
        // 上昇アニメーション
        const duration = 2000 + Math.random() * 2000;
        particle.setAttribute('animation', `property: position; to: ${x} ${y + 5} ${z}; dur: ${duration}; easing: easeInQuad; loop: true;`);
        particle.setAttribute('animation__fade', `property: material.opacity; to: 0; dur: ${duration}; easing: easeInQuad; loop: true;`);
        
        particleSystem.appendChild(particle);
      }
    }
    
    // AR シーン読み込み
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', function() {
      console.log('AR scene loaded');
      document.addEventListener('click', createARContent);
    });
    
    // AR コンテンツ作成
    function createARContent() {
      if (!arStarted || contentCreated) return;
      
      const container = document.getElementById('ar-content');
      container.innerHTML = '';
      
      // 3D ボックス（回転）
      const box = document.createElement('a-box');
      box.setAttribute('position', '0 0 -3');
      box.setAttribute('color', '#ff6b6b');
      box.setAttribute('scale', '0.5 1.5 0.5');
      box.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear');
      
      // 上下移動アニメーション追加
      box.setAttribute('animation__bob', 'property: position; to: 0 0.3 -3; loop: true; dur: 2000; dir: alternate; easing: easeInOutQuad;');
      container.appendChild(box);
      
      // テキスト
      const text = document.createElement('a-text');
      text.setAttribute('value', '神戸ポートタワー\n五感体験ARガイド');
      text.setAttribute('position', '0 2 -3');
      text.setAttribute('align', 'center');
      text.setAttribute('color', 'white');
      text.setAttribute('scale', '1.5 1.5 1.5');
      text.setAttribute('animation', 'property: scale; to: 1.7 1.7 1.7; loop: true; dur: 2000; dir: alternate; easing: easeInOutQuad;');
      container.appendChild(text);
      
      // 光るリング
      const ring = document.createElement('a-torus');
      ring.setAttribute('position', '0 0 -3');
      ring.setAttribute('radius', '1');
      ring.setAttribute('radius-tubular', '0.1');
      ring.setAttribute('color', '#ff9500');
      ring.setAttribute('emissive', '#ff6b6b');
      ring.setAttribute('animation', 'property: rotation; to: 360 0 0; loop: true; dur: 4000; easing: linear;');
      container.appendChild(ring);
      
      // 演出効果が有効な場合はパーティクルも有効化
      if (effectsEnabled) {
        createParticleEffects();
      }
      
      contentCreated = true;
      console.log('AR content created');
    }
    
    // エラー処理
    scene.addEventListener('enter-vr', function() {
      console.log('AR started');
    });
    
    scene.addEventListener('error', function(evt) {
      console.error('AR Error:', evt.detail);
      showError('カメラへのアクセスができませんでした。\nブラウザの設定でカメラを許可してください。');
    });
    
    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
