<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神戸ポートタワー ARガイド</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { 
      width: 100%;
      height: 100%;
      overflow: hidden; 
      background: #000;
    }
    
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 20px 40px;
      border-radius: 30px;
      font-size: 20px;
      cursor: pointer;
      z-index: 2000;
      font-weight: bold;
    }
    
    #start-btn:active {
      background: #ff5555;
    }
    
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,0,0,0.9);
      color: white;
      padding: 20px;
      border-radius: 10px;
      display: none;
      z-index: 3000;
      text-align: center;
      font-size: 16px;
    }
    
    /* 夜間フィルターレイヤー */
    #night-filter {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 20, 40, 0);
      pointer-events: none;
      z-index: 999;
      transition: background 0.5s ease;
    }
    
    /* 昼/夜切り替えボタン */
    #mode-controls {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 2000;
      display: none;
    }
    
    #mode-controls button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    
    #mode-controls button:active {
      background: #3a7bc8;
    }
  </style>
</head>
<body>
  <!-- カメラ起動ボタン -->
  <button id="start-btn" onclick="startAR()">🎬 ARを始める</button>
  
  <!-- 夜間フィルターレイヤー（暗さ調整用） -->
  <div id="night-filter"></div>
  
  <!-- 昼/夜切り替えボタン -->
  <div id="mode-controls">
    <button onclick="toggleNightMode()">🌙 昼/夜切り替え</button>
  </div>
  
  <!-- エラーメッセージ -->
  <div id="error-msg">
    <p id="error-text">エラーが発生しました</p>
    <button onclick="location.reload()" style="margin-top:10px; padding:10px 20px; background: white; color: red; border: none; border-radius: 5px; cursor: pointer;">再試行</button>
  </div>

  <!-- AR.js シーン（カメラのみ） -->
  <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" style="display:none;">
    
    <!-- 昼間ライティング（デフォルト） -->
    <a-light id="ambient-day" type="ambient" color="white" intensity="1.0"></a-light>
    <a-light id="directional-day" type="directional" color="white" intensity="0.8" position="5 10 5"></a-light>
    
    <!-- 夜間ライティング（非表示） -->
    <a-light id="ambient-night" type="ambient" color="#1a3a52" intensity="0.2" visible="false"></a-light>
    <a-light id="directional-night" type="directional" color="#4a7ba7" intensity="0.3" position="0 8 0" visible="false"></a-light>
    
    <!-- カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let arStarted = false;
    let isNightMode = true;  // デフォルトを夜間モード
    
    function startAR() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';
      document.getElementById('mode-controls').style.display = 'block';
      arStarted = true;
      
      // 起動時に夜間ライティングを適用
      applyNightMode();
    }
    
    // 昼/夜モード切り替え
    function toggleNightMode() {
      isNightMode = !isNightMode;
      if (isNightMode) {
        applyNightMode();
      } else {
        applyDayMode();
      }
    }
    
    // 夜間ライティング適用
    function applyNightMode() {
      const ambientDay = document.getElementById('ambient-day');
      const ambientNight = document.getElementById('ambient-night');
      const directionalDay = document.getElementById('directional-day');
      const directionalNight = document.getElementById('directional-night');
      
      ambientDay.setAttribute('visible', false);
      ambientNight.setAttribute('visible', true);
      directionalDay.setAttribute('visible', false);
      directionalNight.setAttribute('visible', true);
      
      // フィルターで暗くする
      const nightFilter = document.getElementById('night-filter');
      nightFilter.style.background = 'rgba(0, 20, 40, 0.4)';
    }
    
    // 昼間ライティング適用
    function applyDayMode() {
      const ambientDay = document.getElementById('ambient-day');
      const ambientNight = document.getElementById('ambient-night');
      const directionalDay = document.getElementById('directional-day');
      const directionalNight = document.getElementById('directional-night');
      
      ambientDay.setAttribute('visible', true);
      ambientNight.setAttribute('visible', false);
      directionalDay.setAttribute('visible', true);
      directionalNight.setAttribute('visible', false);
      
      // フィルターを透明に
      const nightFilter = document.getElementById('night-filter');
      nightFilter.style.background = 'rgba(0, 20, 40, 0)';
    }
    
    // AR シーン読み込み
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', function() {
      console.log('AR scene loaded - Camera feed with night mode');
    });
    
    // エラー処理
    scene.addEventListener('error', function(evt) {
      console.error('AR Error:', evt.detail);
      showError('カメラへのアクセスができませんでした。\nブラウザの設定でカメラを許可してください。');
    });
    
    function showError(msg) {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
