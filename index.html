<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神戸ポートタワー ARガイド</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: sans-serif;
      z-index: 1000;
      max-width: 90%;
    }
    #info h3 { margin: 0 0 10px 0; font-size: 18px; }
    #info p { margin: 5px 0; font-size: 14px; }
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 20px 40px;
      border-radius: 30px;
      font-size: 20px;
      cursor: pointer;
      z-index: 2000;
    }
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,0,0,0.8);
      color: white;
      padding: 20px;
      border-radius: 10px;
      display: none;
      z-index: 3000;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- カメラ起動ボタン -->
  <button id="start-btn" onclick="startAR()">🎬 ARを始める</button>
  
  <div id="info" style="display:none;">
    <h3>🏯 神戸ポートタワー ARガイド</h3>
    <p>画面をタップして AR コンテンツを配置してください</p>
  </div>
  
  <div id="error-msg">
    <p id="error-text">エラーが発生しました</p>
    <button onclick="location.reload()" style="margin-top:10px; padding:10px 20px;">再試行</button>
  </div>

  <!-- AR.js マーカーレス AR -->
  <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false" style="display:none;">
    
    <!-- AR コンテンツコンテナ -->
    <a-entity id="ar-content">
    </a-entity>
    
    <!-- カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let arStarted = false;
    let contentCreated = false;
    
    function startAR() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';
      document.getElementById('info').style.display = 'block';
      arStarted = true;
    }
    
    // AR シーン読み込み
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', function() {
      console.log('AR scene loaded');
      
      // タップイベントでコンテンツを配置
      document.addEventListener('click', createARContent);
    });
    
    // AR コンテンツ作成
    function createARContent() {
      if (!arStarted || contentCreated) return;
      
      const container = document.getElementById('ar-content');
      container.innerHTML = '';
      
      // 3D ボックス
      const box = document.createElement('a-box');
      box.setAttribute('position', '0 0 -3');
      box.setAttribute('color', '#ff6b6b');
      box.setAttribute('scale', '0.5 1.5 0.5');
      box.setAttribute('animation', 'property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear');
      container.appendChild(box);
      
      // テキスト
      const text = document.createElement('a-text');
      text.setAttribute('value', '神戸ポートタワー\n五感体験ARガイド');
      text.setAttribute('position', '0 2 -3');
      text.setAttribute('align', 'center');
      text.setAttribute('color', 'white');
      text.setAttribute('scale', '1.5 1.5 1.5');
      container.appendChild(text);
      
      contentCreated = true;
      console.log('AR content created');
    }
    
    // エラー処理
    scene.addEventListener('enter-vr', function() {
      console.log('AR started');
    });
    
    scene.addEventListener('error', function(evt) {
      console.error('AR Error:', evt.detail);
      showError('カメラへのアクセスができませんでした。\nブラウザの設定でカメラを許可してください。');
    });
    
    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
