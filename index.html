<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>神戸ポートタワー ARガイド</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 8px;
      font-family: sans-serif;
      z-index: 1000;
      max-width: 90%;
    }
    #info h3 { margin: 0 0 10px 0; font-size: 18px; }
    #info p { margin: 5px 0; font-size: 14px; }
    #start-btn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 20px 40px;
      border-radius: 30px;
      font-size: 20px;
      cursor: pointer;
      z-index: 2000;
    }
    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,0,0,0.8);
      color: white;
      padding: 20px;
      border-radius: 10px;
      display: none;
      z-index: 3000;
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- カメラ起動ボタン -->
  <button id="start-btn" onclick="startAR()">🎬 ARを始める</button>
  
  <div id="info" style="display:none;">
    <h3>🏯 神戸ポートタワー ARガイド</h3>
    <p>マーカーをカメラに向けてください</p>
    <p style="color: #aaa; font-size: 12px;">Hiroマーカー: <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank" style="color: #6ff;">ダウンロード</a></p>
  </div>
  
  <div id="error-msg">
    <p id="error-text">エラーが発生しました</p>
    <button onclick="location.reload()" style="margin-top:10px; padding:10px 20px;">再試行</button>
  </div>

  <!-- AR.js マーカー型AR -->
  <a-scene id="ar-scene" embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;" vr-mode-ui="enabled: false" style="display:none;">
    
    <!-- マーカー -->
    <a-marker preset="hiro">
      
      <!-- 神戸ポートタワーの3Dモデル -->
      <a-box position="0 0.5 0" 
             color="#ff6b6b" 
             scale="0.5 1.5 0.5"
             animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
      </a-box>
      
      <!-- テキスト表示 -->
      <a-text value="神戸ポートタワー\n五感体験ARガイド" 
              position="0 2 0" 
              align="center" 
              color="white"
              scale="1.5 1.5 1.5">
      </a-text>
      
    </a-marker>
    
    <!-- カメラ -->
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    let arStarted = false;
    
    function startAR() {
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('ar-scene').style.display = 'block';
      document.getElementById('info').style.display = 'block';
      arStarted = true;
    }
    
    // エラー処理
    document.querySelector('a-scene').addEventListener('enter-vr', function() {
      console.log('AR started');
    });
    
    // エラーイベント
    document.querySelector('a-scene').addEventListener('error', function(evt) {
      console.error('AR Error:', evt.detail);
      showError('カメラへのアクセスができませんでした。\nブラウザの設定でカメラを許可してください。');
    });
    
    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-msg').style.display = 'block';
    }
    
    // カメラ切り替え
    let useFrontCamera = false;
    function toggleCamera() {
      useFrontCamera = !useFrontCamera;
      location.reload();
    }
  </script>
</body>
</html>
